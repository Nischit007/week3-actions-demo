name: Github Workflow

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Cloning the repo
        uses: actions/checkout@v4

      - name: Environment checking
        run: echo "${{ secrets.APP_ENV }}"

      - name: Provide permission and execute app.sh
        run: |
          chmod +x app.sh
          ./app.sh

      - name: Provide permission and execute test.sh
        run: |
          chmod +x test.sh
          ./test.sh